<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Price Prediction</title>
  <link rel="stylesheet" href="static/style.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-house"></i> House Price Predictor</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section text-center text-white py-5" style="background: linear-gradient(135deg,#0d6efd,#6610f2);">
    <div class="container">
      <h1 class="display-5 fw-bold mb-3">Predict Your House Price Instantly</h1>
      <p class="lead">Enter your house details and get an accurate price prediction powered by Machine Learning</p>
    </div>
  </section>

  <!-- Prediction Form -->
  <div class="container my-5">
    <div class="card shadow-lg rounded-4 p-5 mx-auto" style="max-width: 700px; background: #fff;">
      <h2 class="text-center mb-4 text-primary fw-bold"><i class="fa-solid fa-calculator"></i> Calculate Price</h2>

      <form action="/predict" method="post" class="row g-4">
        <div class="col-md-4">
          <label for="area" class="form-label fw-semibold"><i class="fa-solid fa-ruler-combined"></i> Area (sq ft)</label>
          <input type="number" class="form-control form-control-lg" id="area" name="area" placeholder="e.g., 1500" required>
        </div>
        <div class="col-md-4">
          <label for="bedrooms" class="form-label fw-semibold"><i class="fa-solid fa-bed"></i> Bedrooms</label>
          <input type="number" class="form-control form-control-lg" id="bedrooms" name="bedrooms" placeholder="e.g., 3" required>
        </div>
        <div class="col-md-4">
          <label for="bathrooms" class="form-label fw-semibold"><i class="fa-solid fa-bath"></i> Bathrooms</label>
          <input type="number" class="form-control form-control-lg" id="bathrooms" name="bathrooms" placeholder="e.g., 2" required>
        </div>

        <div class="col-12 text-center mt-3">
          <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm"><i class="fa-solid fa-dollar-sign"></i> Predict Price</button>
        </div>
      </form>

      {% if prediction_text %}
      <div class="alert alert-success mt-4 text-center rounded-4 fw-bold fs-5 shadow-sm">
        <i class="fa-solid fa-circle-check"></i> {{ prediction_text }}
      </div>
      {% endif %}

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
    &copy; 2026 House Price Predictor | Built with ❤️ by Hassan Ali
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
